<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#1F2A2B"/>
  <!-- Book spine -->
  <rect x="32" y="36" width="16" height="108" rx="4" fill="#D4A04A"/>
  <!-- Book body -->
  <rect x="48" y="36" width="90" height="108" rx="8" fill="#2A3838"/>
  <!-- Book pages edge -->
  <rect x="48" y="40" width="4" height="100" fill="#3F5A5C"/>
  <!-- Lines on page -->
  <line x1="66" y1="62" x2="118" y2="62" stroke="#556677" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66" y1="78" x2="112" y2="78" stroke="#556677" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66" y1="94" x2="106" y2="94" stroke="#556677" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66" y1="110" x2="100" y2="110" stroke="#556677" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Speech bubble -->
  <rect x="104" y="96" width="60" height="48" rx="12" fill="#069A8E"/>
  <!-- Bubble tail -->
  <polygon points="112,144 100,158 124,144" fill="#069A8E"/>
  <!-- "E" text in bubble -->
  <text x="134" y="129" text-anchor="middle" font-size="30" font-family="Georgia, serif" font-weight="bold" fill="#ffffff">E</text>
</svg>
